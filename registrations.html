<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workshop Registrations — Interview Rubric Creator</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      background: #f7f5f0;
      color: #1a1a18;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }
    .page { max-width: 860px; margin: 0 auto; }

    .header {
      background: linear-gradient(160deg, #0f1424 0%, #1a2a4a 60%, #0d1a3a 100%);
      padding: 32px 36px;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      margin-bottom: 32px;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(100,160,220,0.18) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .header-tag {
      display: inline-block;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: #7db8d4;
      background: rgba(125,184,212,0.12);
      border: 0.5px solid rgba(125,184,212,0.3);
      padding: 4px 12px; border-radius: 20px;
      margin-bottom: 14px;
    }
    .header-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 26px; font-weight: 600;
      color: #f5f2ec; line-height: 1.3;
      margin-bottom: 6px;
    }
    .header-subtitle {
      font-size: 14px; color: rgba(245,242,236,0.6);
    }

    /* Stats row */
    .stats-row {
      display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .stat-card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 16px 20px;
      flex: 1; min-width: 140px;
    }
    .stat-value {
      font-family: 'Lora', Georgia, serif;
      font-size: 28px; font-weight: 600;
      color: #1a2a4a;
      margin-bottom: 2px;
    }
    .stat-label {
      font-size: 12px; color: #888780;
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    /* Table */
    .table-card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 14px;
      overflow: hidden;
    }
    .table-toolbar {
      padding: 14px 20px;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      display: flex; justify-content: space-between; align-items: center;
    }
    .table-title {
      font-size: 15px; font-weight: 500; color: #1a1a18;
    }
    .refresh-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      color: #2d5a8f; background: rgba(45,90,143,0.08);
      border: 0.5px solid rgba(45,90,143,0.2);
      padding: 6px 14px; border-radius: 7px;
      cursor: pointer; transition: background 0.2s;
    }
    .refresh-btn:hover { background: rgba(45,90,143,0.15); }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      text-align: left;
      font-size: 11px; font-weight: 500;
      color: #888780;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 12px 16px;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      background: #fafaf7;
    }
    tbody td {
      font-size: 14px; color: #2a2a26;
      padding: 12px 16px;
      border-bottom: 0.5px solid rgba(0,0,0,0.05);
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafaf7; }
    .bg-pill {
      font-size: 11px; font-weight: 500;
      color: #0d2040; background: #c8ddef;
      padding: 3px 10px; border-radius: 12px;
      display: inline-block;
    }

    /* Loading / empty states */
    .state-msg {
      text-align: center;
      padding: 48px 20px;
      color: #888780;
      font-size: 14px;
    }
    .state-msg.error { color: #b04040; }
    .spinner {
      width: 24px; height: 24px;
      border: 2.5px solid rgba(0,0,0,0.08);
      border-top-color: #2d5a8f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link {
      display: inline-block; margin-top: 24px;
      font-size: 13px; color: #2d5a8f;
      text-decoration: none; font-weight: 500;
    }
    .back-link:hover { text-decoration: underline; }

    @media (max-width: 520px) {
      .header { padding: 24px 20px; }
      .header-title { font-size: 22px; }
      thead th, tbody td { padding: 10px 12px; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-tag">Admin View</div>
    <h1 class="header-title">Workshop Registrations</h1>
    <p class="header-subtitle">Interview Rubric Creator &mdash; Monday, July 13, 2026</p>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="total-count">--</div>
      <div class="stat-label">Total Registered</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="latest-date">--</div>
      <div class="stat-label">Latest Registration</div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-toolbar">
      <span class="table-title">Attendees</span>
      <button class="refresh-btn" onclick="loadRegistrations()">Refresh</button>
    </div>
    <div id="table-container">
      <div class="state-msg" id="loading-msg">
        <div class="spinner"></div>
        Loading registrations&hellip;
      </div>
    </div>
  </div>

  <a href="index.html" class="back-link">&larr; Back to workshop page</a>

</div>

<script>
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx-Ohmky0w62-fWpDjKWSqv1xihzuk_v3VGrCqA6vhvkF1O4Tfho9SupX8WLzvy4ehFlA/exec';

  var bgLabels = {
    'tech': 'Software / Tech',
    'transition': 'Career Transition',
    'hiring': 'Hiring Manager',
    'product': 'Product / Business',
    'student': 'Student',
    'faith': 'Faith Leader',
    'learner': 'Curious Learner',
    'other': 'Other'
  };

  function formatDate(dateStr) {
    if (!dateStr) return '--';
    var d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function formatDateTime(dateStr) {
    if (!dateStr) return '--';
    var d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' at ' +
           d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function renderTable(rows) {
    var container = document.getElementById('table-container');

    if (!rows || rows.length === 0) {
      container.innerHTML = '<div class="state-msg">No registrations yet.</div>';
      document.getElementById('total-count').textContent = '0';
      document.getElementById('latest-date').textContent = '--';
      return;
    }

    document.getElementById('total-count').textContent = rows.length;

    var latest = rows[rows.length - 1]['Timestamp'];
    document.getElementById('latest-date').textContent = formatDateTime(latest);

    var html = '<table><thead><tr>' +
      '<th>#</th><th>Name</th><th>Email</th><th>Background</th><th>Registered</th>' +
      '</tr></thead><tbody>';

    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var bg = bgLabels[r['Background']] || r['Background'] || '--';
      html += '<tr>' +
        '<td>' + (i + 1) + '</td>' +
        '<td>' + escHtml(r['First Name'] || '') + ' ' + escHtml(r['Last Name'] || '') + '</td>' +
        '<td>' + escHtml(r['Email'] || '') + '</td>' +
        '<td><span class="bg-pill">' + escHtml(bg) + '</span></td>' +
        '<td>' + formatDate(r['Timestamp']) + '</td>' +
        '</tr>';
    }

    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function escHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function loadRegistrations() {
    var container = document.getElementById('table-container');
    container.innerHTML = '<div class="state-msg"><div class="spinner"></div>Loading registrations&hellip;</div>';

    fetch(SCRIPT_URL)
      .then(function(res) { return res.json(); })
      .then(function(json) {
        if (json.status === 'success') {
          renderTable(json.data);
        } else {
          container.innerHTML = '<div class="state-msg error">Error: ' + escHtml(json.message || 'Unknown error') + '</div>';
        }
      })
      .catch(function(err) {
        container.innerHTML = '<div class="state-msg error">Could not load registrations.<br>Make sure the Google Apps Script URL is configured.</div>';
      });
  }

  loadRegistrations();
</script>
</body>
</html>
